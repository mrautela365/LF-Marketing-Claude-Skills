<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LF Ad Copy Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --accent: #00d4aa;
    --accent2: #6366f1;
    --accent3: #f59e0b;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --text-muted: #55556a;
    --danger: #ef4444;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  .logo-area { display: flex; align-items: center; gap: 14px; }

  .logo-mark {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 14px;
    color: #000;
    flex-shrink: 0;
  }

  .logo-text { line-height: 1.2; }
  .logo-text .org { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .logo-text .tool { font-size: 18px; font-weight: 600; color: var(--text); }

  .header-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    border: 1px solid rgba(0,212,170,0.3);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.08em;
  }

  /* Two-column layout */
  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
  }

  .panel-icon {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .panel-body { padding: 20px; }

  /* Form fields */
  .field { margin-bottom: 20px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  input[type="url"], input[type="text"], textarea, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
  }

  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  .url-wrap { position: relative; }
  .url-wrap input { padding-left: 38px; }
  .url-prefix {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
    pointer-events: none;
  }

  /* Channel grid */
  .channel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .channel-item {
    position: relative;
  }

  .channel-item input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
  }

  .channel-label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    user-select: none;
    letter-spacing: 0;
    text-transform: none;
  }

  .channel-label:hover { border-color: var(--accent); color: var(--text); }

  .channel-item input:checked + .channel-label {
    border-color: var(--accent);
    background: rgba(0,212,170,0.08);
    color: var(--accent);
  }

  .channel-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Channel colors */
  .ch-google { background: #4285f4; }
  .ch-microsoft { background: #00a4ef; }
  .ch-linkedin { background: #0077b5; }
  .ch-reddit { background: #ff4500; }
  .ch-meta { background: #1877f2; }
  .ch-brave { background: #fb542b; }
  .ch-feathr { background: #8b5cf6; }
  .ch-twitter { background: #1da1f2; }

  /* CTA */
  .generate-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #00b894);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 24px;
    text-transform: uppercase;
  }

  .generate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Output panel */
  .output-panel { min-height: 400px; }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    gap: 16px;
    color: var(--text-muted);
    text-align: center;
  }

  .placeholder-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .placeholder p { font-size: 14px; line-height: 1.6; max-width: 280px; }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    gap: 20px;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* Results */
  .results { padding: 20px; }

  .result-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .result-url {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 300px;
  }

  .copy-all-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .copy-all-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Channel sections */
  .channel-section {
    margin-bottom: 28px;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .channel-section:nth-child(1) { animation-delay: 0.05s; }
  .channel-section:nth-child(2) { animation-delay: 0.1s; }
  .channel-section:nth-child(3) { animation-delay: 0.15s; }
  .channel-section:nth-child(4) { animation-delay: 0.2s; }
  .channel-section:nth-child(5) { animation-delay: 0.25s; }
  .channel-section:nth-child(6) { animation-delay: 0.3s; }
  .channel-section:nth-child(7) { animation-delay: 0.35s; }

  .ch-section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .ch-section-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .ch-section-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid;
  }

  /* Ad cards */
  .ad-cards { display: flex; flex-direction: column; gap: 10px; }

  .ad-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .ad-card:hover { border-color: rgba(0,212,170,0.3); }

  .ad-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .ad-type-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .copy-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: all 0.15s;
    font-family: var(--mono);
  }

  .copy-btn:hover { color: var(--accent); background: rgba(0,212,170,0.1); }
  .copy-btn.copied { color: var(--accent); }

  .ad-card-body { padding: 12px 14px; }

  .ad-field { margin-bottom: 10px; }
  .ad-field:last-child { margin-bottom: 0; }

  .ad-field-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }

  .ad-field-value {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }

  .char-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-left: 6px;
  }

  .char-over { color: var(--danger); }

  .ad-field-value.headline { font-weight: 600; font-size: 14px; }
  .ad-field-value.body-copy { color: var(--text-dim); }

  /* Streaming cursor */
  .streaming-cursor::after {
    content: '▋';
    animation: blink 1s step-end infinite;
    color: var(--accent);
    font-size: 12px;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* Error */
  .error-banner {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    color: #fca5a5;
    margin: 20px;
    font-family: var(--mono);
  }

  /* Scrollable output */
  .output-scroll { max-height: 80vh; overflow-y: auto; }
  .output-scroll::-webkit-scrollbar { width: 4px; }
  .output-scroll::-webkit-scrollbar-track { background: transparent; }
  .output-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .channel-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo-area">
      <div class="logo-mark">LF</div>
      <div class="logo-text">
        <div class="org">The Linux Foundation</div>
        <div class="tool">Ad Copy Generator</div>
      </div>
    </div>
    <div class="header-badge">PAID MEDIA TOOL v1.0</div>
  </div>

  <div class="layout">

    <!-- Left: Config -->
    <div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-icon"></div>
          <div class="panel-title">Campaign Configuration</div>
        </div>
        <div class="panel-body">

          <div class="field">
            <label>Landing Page URL</label>
            <div class="url-wrap">
              <span class="url-prefix">🔗</span>
              <input type="url" id="landingUrl" placeholder="https://training.linuxfoundation.org/..." />
            </div>
          </div>

          <div class="field">
            <label>Campaign Goal</label>
            <select id="campaignGoal">
              <option value="">— Select a goal —</option>
              <option value="conversions">Conversions / Registrations</option>
              <option value="leads">Lead Generation</option>
              <option value="awareness">Brand / Product Awareness</option>
              <option value="event">Event Attendance</option>
              <option value="certification">Certification Enrollment</option>
              <option value="course">Course Sales</option>
              <option value="membership">Membership Sign-up</option>
            </select>
          </div>

          <div class="field">
            <label>Target Audience</label>
            <input type="text" id="audience" placeholder="e.g. DevOps engineers, CTOs, open source devs" />
          </div>

          <div class="field">
            <label>Key Value Prop / Offer (optional)</label>
            <textarea id="valueProp" placeholder="e.g. Earn your CKA in 3 months. Industry-recognized. 30% off through June 30."></textarea>
          </div>

          <div class="field">
            <label>Ad Channels</label>
            <div class="channel-grid">

              <div class="channel-item">
                <input type="checkbox" id="ch-google" value="google">
                <label class="channel-label" for="ch-google">
                  <span class="channel-dot ch-google"></span> Google Ads
                </label>
              </div>

              <div class="channel-item">
                <input type="checkbox" id="ch-microsoft" value="microsoft">
                <label class="channel-label" for="ch-microsoft">
                  <span class="channel-dot ch-microsoft"></span> Microsoft Ads
                </label>
              </div>

              <div class="channel-item">
                <input type="checkbox" id="ch-linkedin" value="linkedin">
                <label class="channel-label" for="ch-linkedin">
                  <span class="channel-dot ch-linkedin"></span> LinkedIn Ads
                </label>
              </div>

              <div class="channel-item">
                <input type="checkbox" id="ch-reddit" value="reddit">
                <label class="channel-label" for="ch-reddit">
                  <span class="channel-dot ch-reddit"></span> Reddit Ads
                </label>
              </div>

              <div class="channel-item">
                <input type="checkbox" id="ch-meta" value="meta">
                <label class="channel-label" for="ch-meta">
                  <span class="channel-dot ch-meta"></span> Meta (FB/IG)
                </label>
              </div>

              <div class="channel-item">
                <input type="checkbox" id="ch-brave" value="brave">
                <label class="channel-label" for="ch-brave">
                  <span class="channel-dot ch-brave"></span> Brave Ads
                </label>
              </div>

              <div class="channel-item">
                <input type="checkbox" id="ch-feathr" value="feathr">
                <label class="channel-label" for="ch-feathr">
                  <span class="channel-dot ch-feathr"></span> Feathr
                </label>
              </div>

              <div class="channel-item">
                <input type="checkbox" id="ch-twitter" value="twitter">
                <label class="channel-label" for="ch-twitter">
                  <span class="channel-dot ch-twitter"></span> X / Twitter
                </label>
              </div>

            </div>
          </div>

          <button class="generate-btn" id="generateBtn" onclick="generateCopy()">
            ⚡ Generate Ad Copy
          </button>

        </div>
      </div>
    </div>

    <!-- Right: Output -->
    <div class="panel output-panel" id="outputPanel">
      <div class="panel-header">
        <div class="panel-icon" style="background: var(--accent2); box-shadow: 0 0 8px var(--accent2);"></div>
        <div class="panel-title">Generated Ad Copy</div>
      </div>
      <div id="outputContent">
        <div class="placeholder">
          <div class="placeholder-icon">✦</div>
          <p>Configure your campaign on the left and click <strong>Generate Ad Copy</strong> to get channel-optimized copy.</p>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const CHANNEL_META = {
  google: {
    name: 'Google Ads',
    color: '#4285f4',
    badge: 'Search + RSA',
    adTypes: ['Responsive Search Ad (RSA)', 'Performance Max Asset', 'Display Ad']
  },
  microsoft: {
    name: 'Microsoft / Bing Ads',
    color: '#00a4ef',
    badge: 'Search + Audience',
    adTypes: ['Responsive Search Ad', 'Audience Ad']
  },
  linkedin: {
    name: 'LinkedIn Ads',
    color: '#0077b5',
    badge: 'Sponsored Content',
    adTypes: ['Single Image Ad', 'Text Ad', 'Message Ad (InMail)', 'Carousel Ad']
  },
  reddit: {
    name: 'Reddit Ads',
    color: '#ff4500',
    badge: 'Promoted Post',
    adTypes: ['Promoted Post', 'Conversation Ad']
  },
  meta: {
    name: 'Meta (Facebook & Instagram)',
    color: '#1877f2',
    badge: 'FB + IG',
    adTypes: ['Primary Text + Headline', 'Story / Reel Ad', 'Carousel Ad']
  },
  brave: {
    name: 'Brave Ads',
    color: '#fb542b',
    badge: 'Privacy-First',
    adTypes: ['Notification Ad', 'In-Browser Display Ad']
  },
  feathr: {
    name: 'Feathr',
    color: '#8b5cf6',
    badge: 'Event Retargeting',
    adTypes: ['Display Retargeting Ad', 'Email Banner']
  },
  twitter: {
    name: 'X / Twitter',
    color: '#1da1f2',
    badge: 'Promoted',
    adTypes: ['Promoted Tweet / Post', 'Website Card']
  }
};

function getSelectedChannels() {
  return Array.from(document.querySelectorAll('.channel-item input:checked')).map(i => i.value);
}

// Hard character limits map — field key fragment → max chars
// Used both in the prompt AND in post-processing enforcement
const CHAR_LIMITS = {
  // Google / Microsoft RSA
  rsa_headline: 30,       // each item in headlines[]
  rsa_description: 90,    // each item in descriptions[]
  display_url_path1: 15,
  display_url_path2: 15,
  // Google Display / PMax
  long_headline: 90,
  business_name: 25,
  // LinkedIn
  linkedin_headline: 70,
  linkedin_intro_text: 150,
  linkedin_description: 100,
  linkedin_text_headline: 25,
  linkedin_text_body: 75,
  linkedin_subject: 60,
  linkedin_message_cta: 20,
  linkedin_message_body: 1500,
  linkedin_carousel_intro: 255,
  linkedin_card_headline: 45,
  linkedin_card_body: 255,
  // Reddit
  reddit_headline: 300,
  reddit_body: 1000,
  // Meta
  meta_primary_text: 125,
  meta_primary_text_long: 500,
  meta_headline: 27,
  meta_description: 30,
  meta_story_headline: 34,
  meta_story_body: 80,
  meta_carousel_intro: 125,
  meta_card_headline: 40,
  meta_card_description: 20,
  // Brave
  brave_title: 30,
  brave_notification_body: 60,
  brave_notification_cta: 15,
  brave_display_headline: 60,
  brave_display_body: 90,
  brave_display_cta: 20,
  // Feathr
  feathr_display_headline: 50,
  feathr_display_body: 100,
  feathr_display_cta: 25,
  feathr_subject_line: 60,
  feathr_preheader: 90,
  feathr_email_headline: 50,
  feathr_email_body: 200,
  feathr_email_cta: 25,
  // Twitter/X
  twitter_copy: 280,
  tweet_copy: 200,
  card_title: 70,
  // Generic fallbacks (applied by field name fragment)
  headline: 30,
  description: 90,
  subject: 60,
  preheader: 90,
  title: 30,
  body: 1000,
  cta: 25,
  intro_text: 255,
};

// Resolve the limit for a given field key + parent ad type context
function resolveLimit(fieldKey, adType) {
  const k = fieldKey.toLowerCase();
  const t = (adType || '').toLowerCase();

  // Exact field-name matches first
  if (k === 'display_url_path1') return 15;
  if (k === 'display_url_path2') return 15;
  if (k === 'long_headline') return 90;
  if (k === 'business_name') return 25;
  if (k === 'tweet_copy') return 200;
  if (k === 'card_title') return 70;
  if (k === 'primary_text') return 125;
  if (k === 'primary_text_long') return 500;
  if (k === 'subject_line') return 60;
  if (k === 'preheader') return 90;

  // Context-aware — ad type + field combos
  if (k === 'headline') {
    if (t.includes('rsa') || t.includes('responsive') || t.includes('search') || t.includes('display') || t.includes('pmax') || t.includes('performance')) return 30;
    if (t.includes('linkedin') && t.includes('text')) return 25;
    if (t.includes('linkedin')) return 70;
    if (t.includes('meta') && t.includes('story')) return 34;
    if (t.includes('meta') && t.includes('carousel')) return 40;
    if (t.includes('meta')) return 27;
    if (t.includes('brave') && t.includes('display')) return 60;
    if (t.includes('brave')) return 30;
    if (t.includes('feathr')) return 50;
    if (t.includes('carousel')) return 45;
    return 30;
  }
  if (k === 'body') {
    if (t.includes('linkedin') && t.includes('text')) return 75;
    if (t.includes('linkedin') && t.includes('message')) return 1500;
    if (t.includes('linkedin') && t.includes('carousel')) return 255;
    if (t.includes('meta') && t.includes('story')) return 80;
    if (t.includes('brave') && t.includes('notification')) return 60;
    if (t.includes('brave') && t.includes('display')) return 90;
    if (t.includes('feathr') && t.includes('email')) return 200;
    if (t.includes('feathr')) return 100;
    if (t.includes('reddit')) return 1000;
    return 1000;
  }
  if (k === 'intro_text') {
    if (t.includes('meta')) return 125;
    return 255;
  }
  if (k === 'description') {
    if (t.includes('rsa') || t.includes('responsive') || t.includes('search')) return 90;
    if (t.includes('linkedin')) return 100;
    if (t.includes('meta') && t.includes('carousel')) return 20;
    if (t.includes('meta')) return 30;
    return 90;
  }
  if (k === 'cta') {
    if (t.includes('brave') && t.includes('notification')) return 15;
    if (t.includes('linkedin') && t.includes('message')) return 20;
    return 25;
  }
  if (k === 'title') return 30;
  if (k === 'subject') return 60;
  if (k === 'copy') return 280;
  if (k === 'headline') return 30;

  return null; // no limit known
}

// Post-process: trim any string that exceeds its character limit
function enforceCharLimits(adData) {
  for (const channel of Object.keys(adData)) {
    const ads = adData[channel];
    if (!Array.isArray(ads)) continue;
    for (const ad of ads) {
      if (!ad.fields) continue;
      trimFields(ad.fields, ad.type || '');
    }
  }
  return adData;
}

function trimFields(fields, adType) {
  for (const [key, val] of Object.entries(fields)) {
    if (Array.isArray(val)) {
      if (val.length > 0 && typeof val[0] === 'string') {
        // headlines[], descriptions[], etc.
        const limit = resolveLimit(key, adType);
        if (limit) {
          fields[key] = val.map(s => typeof s === 'string' && s.length > limit ? s.slice(0, limit).trimEnd() : s);
        }
      } else if (val.length > 0 && typeof val[0] === 'object') {
        // cards[]
        for (const card of val) {
          trimFields(card, adType);
        }
      }
    } else if (typeof val === 'string') {
      const limit = resolveLimit(key, adType);
      if (limit && val.length > limit) {
        fields[key] = val.slice(0, limit).trimEnd();
      }
    }
  }
}

function buildPrompt(url, goal, audience, valueProp, channels) {
  const channelNames = channels.map(c => CHANNEL_META[c]?.name || c).join(', ');

  return `You are a world-class performance marketing copywriter for The Linux Foundation — the global nonprofit home of Linux, Kubernetes, Node.js, and hundreds of critical open source projects.

Generate conversion-optimized ad copy for the following campaign. Return ONLY valid JSON — no markdown, no preamble, no explanation, no code fences.

⚠️ CHARACTER LIMITS ARE HARD REQUIREMENTS — NOT GUIDELINES ⚠️
Before writing each string, plan it to fit. After writing it, count every character including spaces and punctuation. If it exceeds the limit, rewrite it shorter. Do NOT truncate mid-word — craft copy that is complete and compelling within the limit. A string that is 1 character over is a failure. Every single string in your output MUST comply.

CAMPAIGN DETAILS:
- Landing Page: ${url}
- Campaign Goal: ${goal || 'Conversions'}

Return a JSON object where each key is a channel ID from: ${channels.join(', ')}
Each value is an array of ad objects with "type" (string) and "fields" (object).
Write 2 variations per ad type where format allows.

════════════════════════════════════════
CHARACTER LIMITS — STRICTLY ENFORCED
════════════════════════════════════════

GOOGLE RSA / MICROSOFT RSA (type: "Responsive Search Ad"):
  headlines: array of 10–15 strings — EACH STRING ≤ 30 CHARACTERS (count carefully)
  descriptions: array of 4–6 strings — EACH STRING ≤ 90 CHARACTERS
  display_url_path1: ≤ 15 chars
  display_url_path2: ≤ 15 chars

GOOGLE DISPLAY / PMAX (type: "Performance Max Asset"):

  cta: ≤ 20 chars

  body: ≤ 100 chars

  subject_line: ≤ 60 chars
  preheader: ≤ 90 chars
  headline: ≤ 50 chars

  cta: ≤ 25 chars

  copy: ≤ 280 chars (include ≤ 2 relevant hashtags)

  tweet_copy: ≤ 200 chars
  card_title: ≤ 70 chars

SELF-CHECK BEFORE RETURNING JSON:
For EVERY string in your output, verify: string.length <= limit. If any string fails, rewrite it. Only return the JSON when all strings comply.
════════════════════════════════════════`;
}

async function generateCopy() {
  const url = document.getElementById('landingUrl').value.trim();
  const goal = document.getElementById('campaignGoal').value;
  const audience = document.getElementById('audience').value.trim();
  const valueProp = document.getElementById('valueProp').value.trim();
  const channels = getSelectedChannels();

  if (!url) { alert('Please enter a landing page URL.'); return; }
  if (channels.length === 0) { alert('Please select at least one ad channel.'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Generating...';

  document.getElementById('outputContent').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Crafting conversion-optimized copy for ${channels.length} channel${channels.length > 1 ? 's' : ''}…</div>
    </div>`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 8000,
        messages: [{
          role: "user",
          content: buildPrompt(url, goal, audience, valueProp, channels)
        }]
      })
    });

    const data = await response.json();
    const rawText = data.content?.map(b => b.text || '').join('') || '';

    // Parse JSON
    const clean = rawText.replace(/```json|```/g, '').trim();
    let adData;
    try {
      adData = JSON.parse(clean);
    } catch(e) {
      throw new Error('Could not parse AI response. Try again.');
    }

    // Hard-enforce all character limits as a safety net
    enforceCharLimits(adData);

    renderResults(url, channels, adData);

  } catch (err) {
    document.getElementById('outputContent').innerHTML = `<div class="error-banner">⚠ ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ Generate Ad Copy';
  }
}

function renderResults(url, channels, adData) {
  const cont = document.getElementById('outputContent');
  window._cardMap = {}; // reset for this generation

  let html = `<div class="results output-scroll">
    <div class="result-meta">
      <div class="result-url">🔗 ${url}</div>
      <button class="copy-all-btn" onclick="copyAll()">Copy All</button>
    </div>`;

  for (const ch of channels) {
    const meta = CHANNEL_META[ch];
    const chData = adData[ch];
    if (!chData || !Array.isArray(chData)) continue;

    html += `<div class="channel-section">
      <div class="ch-section-header">
        <span class="channel-dot" style="background:${meta.color}; width:10px; height:10px; border-radius:2px; display:inline-block;"></span>
        <span class="ch-section-name">${meta.name}</span>
        <span class="ch-section-badge" style="color:${meta.color}; border-color:${meta.color}40;">${meta.badge}</span>
      </div>
      <div class="ad-cards">`;

    for (const ad of chData) {
      const cardId = `card-${Math.random().toString(36).slice(2,8)}`;
      window._cardMap = window._cardMap || {};
      window._cardMap[cardId] = { channel: ch, ad };

      html += `<div class="ad-card" id="${cardId}">
        <div class="ad-card-header">
          <span class="ad-type-tag">${ad.type || 'Ad'}</span>
          <button class="copy-btn" onclick="copyCard('${cardId}', this)">copy</button>
        </div>
        <div class="ad-card-body">`;

      const fields = ad.fields || {};
      for (const [key, val] of Object.entries(fields)) {
        html += renderField(key, val, ad.type || '');
      }

      html += `</div></div>`;
    }

    html += `</div></div>`;
  }

  html += `</div>`;
  cont.innerHTML = html;
  window._lastAdData = adData;
  window._lastChannels = channels;
}

function renderField(key, val, adType) {
  adType = adType || '';
  const label = key.replace(/_/g, ' ');

  if (Array.isArray(val)) {
    if (typeof val[0] === 'string') {
      return `<div class="ad-field">
        <div class="ad-field-label">${label} (${val.length})</div>
        ${val.map((v, i) => {
          const cls = key.includes('headline') ? 'headline' : key.includes('description') || key.includes('body') ? 'body-copy' : '';
          const chars = v.length;
          const limit = getCharLimit(key, adType);
          const over = limit && chars > limit;
          return `<div class="ad-field-value ${cls}" style="margin-bottom:4px; padding:4px 8px; background:var(--surface2); border-radius:4px;">
            ${escHtml(v)}
            <span class="char-count ${over ? 'char-over' : ''}">${chars}${limit ? '/'+limit : ''}</span>
          </div>`;
        }).join('')}
      </div>`;
    } else if (val.length > 0 && typeof val[0] === 'object') {
      return `<div class="ad-field">
        <div class="ad-field-label">${label}</div>
        ${val.map((card, i) => `
          <div style="padding:8px; background:var(--surface2); border-radius:6px; margin-bottom:6px;">
            <div style="font-size:10px; color:var(--text-muted); font-family:var(--mono); margin-bottom:4px;">CARD ${i+1}</div>
            ${Object.entries(card).map(([k,v]) => {
              const limit = getCharLimit(k, adType);
              const chars = String(v).length;
              const over = limit && chars > limit;
              return `<div style="margin-bottom:4px;">
                <span style="font-size:10px; color:var(--text-muted); font-family:var(--mono);">${k}: </span>
                <span style="font-size:13px;">${escHtml(String(v))}</span>
                <span class="char-count ${over ? 'char-over' : ''}">${chars}${limit ? '/'+limit : ''}</span>
              </div>`;
            }).join('')}
          </div>`).join('')}
      </div>`;
    }
  }

  const strVal = String(val);
  const chars = strVal.length;
  const limit = getCharLimit(key, adType);
  const over = limit && chars > limit;
  const cls = key.includes('headline') ? 'headline' : key.includes('body') || key.includes('description') || key.includes('text') ? 'body-copy' : '';

  return `<div class="ad-field">
    <div class="ad-field-label">${label} <span class="char-count ${over ? 'char-over' : ''}">${chars}${limit ? '/'+limit : ''}</span></div>
    <div class="ad-field-value ${cls}">${escHtml(strVal)}</div>
  </div>`;
}

function getCharLimit(key, adType) {
  return resolveLimit(key, adType || '');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Serialize a single ad's fields into clean plain text
function serializeAd(ad, channelName) {
  const lines = [];
  if (channelName) lines.push(`Channel: ${channelName}`);
  lines.push(`Format: ${ad.type || 'Ad'}`);
  lines.push('');
  for (const [key, val] of Object.entries(ad.fields || {})) {
    const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    if (Array.isArray(val)) {
      if (val.length > 0 && typeof val[0] === 'string') {
        lines.push(`${label}:`);
        val.forEach((v, i) => lines.push(`  ${i + 1}. ${v}`));
      } else if (val.length > 0 && typeof val[0] === 'object') {
        lines.push(`${label}:`);
        val.forEach((card, i) => {
          lines.push(`  Card ${i + 1}:`);
          for (const [k, v] of Object.entries(card)) {
            const cardLabel = k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            lines.push(`    ${cardLabel}: ${v}`);
          }
        });
      }
    } else {
      lines.push(`${label}: ${val}`);
    }
  }
  return lines.join('\n');
}

function copyCard(cardId, btn) {
  const entry = (window._cardMap || {})[cardId];
  if (!entry) return;

  const chName = CHANNEL_META[entry.channel]?.name || entry.channel;
  const text = serializeAd(entry.ad, chName);

  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll() {
  const adData = window._lastAdData;
  const channels = window._lastChannels;
  if (!adData || !channels) return;

  const sections = channels.map(ch => {
    const chData = adData[ch];
    if (!Array.isArray(chData)) return null;
    const chName = CHANNEL_META[ch]?.name || ch;
    const divider = '═'.repeat(50);
    const adBlocks = chData.map(ad => serializeAd(ad)).join('\n\n' + '─'.repeat(40) + '\n\n');
    return `${divider}\n${chName.toUpperCase()}\n${divider}\n\n${adBlocks}`;
  }).filter(Boolean);

  const allText = sections.join('\n\n\n');

  navigator.clipboard.writeText(allText).then(() => {
    const btn = document.querySelector('.copy-all-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}
